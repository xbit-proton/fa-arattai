<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>x0s // Arattai Dynamic Sync</title>
    
    <link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@400;500;600&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/gh/xbit-proton/fa-arattai/arattai.css">

    <style>
        :root {
            --accent: #007aff;
            --font-main: 'Space Grotesk', sans-serif;
            
            /* Bright Mode Variables (Default) */
            --bg: #ffffff;
            --card: #f5f5f7;
            --border: #e5e5e7;
            --text: #1d1d1f;
        }

        /* Dark Mode Variables */
        body.dark-mode {
            --bg: #000000;
            --card: #0a0a0a;
            --border: #1a1a1a;
            --text: #ffffff;
        }

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
            transition: background-color 0.4s cubic-bezier(0.4, 0, 0.2, 1), 
                        color 0.4s cubic-bezier(0.4, 0, 0.2, 1),
                        border-color 0.4s cubic-bezier(0.4, 0, 0.2, 1);
        }

        body {
            background-color: var(--bg);
            color: var(--text);
            font-family: var(--font-main);
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            overflow: hidden;
        }

        .interface-container {
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 40px;
            animation: slideUp 0.8s cubic-bezier(0.2, 0.8, 0.2, 1);
        }

        @keyframes slideUp {
            from { transform: translateY(20px); opacity: 0; }
            to { transform: translateY(0); opacity: 1; }
        }

        /* Mode Toggle Pill */
        .toggle-pill {
            display: flex;
            align-items: center;
            padding: 6px;
            background: var(--card);
            border: 1px solid var(--border);
            border-radius: 50px;
            cursor: pointer;
            width: 120px;
            position: relative;
        }

        .toggle-label {
            font-size: 10px;
            font-weight: 600;
            text-transform: uppercase;
            letter-spacing: 1px;
            width: 50%;
            text-align: center;
            z-index: 2;
            pointer-events: none;
            color: #888;
        }

        .toggle-label.active {
            color: var(--text);
        }

        .toggle-slider {
            position: absolute;
            width: calc(50% - 6px);
            height: calc(100% - 12px);
            background: var(--accent);
            border-radius: 50px;
            transition: transform 0.3s cubic-bezier(0.4, 0, 0.2, 1);
            left: 6px;
        }

        body.dark-mode .toggle-slider {
            transform: translateX(100%);
        }

        /* The Main Arattai Pill */
        .arattai-pill {
            display: flex;
            align-items: center;
            gap: 12px;
            padding: 16px 32px;
            background: var(--card);
            border: 1px solid var(--border);
            border-radius: 50px;
            text-decoration: none;
            color: var(--text);
            font-size: 16px;
            font-weight: 500;
            backdrop-filter: blur(10px);
        }

        .arattai-pill:active {
            transform: scale(0.96);
        }

        /* Developer Badge */
        .badge {
            font-size: 8px;
            text-transform: uppercase;
            letter-spacing: 2.5px;
            color: var(--accent);
            opacity: 0.6;
            margin-top: 20px;
        }

        .credits {
            font-size: 10px;
            color: #888;
            margin-top: 50px;
            text-align: center;
        }
    </style>
</head>
<body class="bright-mode"> <div class="interface-container">
        
        <div class="toggle-pill" onclick="toggleTheme()">
            <div class="toggle-slider"></div>
            <div class="toggle-label" id="label-bright">Bright</div>
            <div class="toggle-label" id="label-dark">Dark</div>
        </div>

        <a href="#" class="arattai-pill">
            <i id="arattai-icon" class="fa-arattai"></i>
            <span>Arattai Messenger</span>
        </a>

        <div class="badge">SYSTEM.X0S.V3</div>

        <div class="credits">
            Credits to <b>#pruthvi graphics Ranibennur</b>
        </div>
    </div>

    <script>
        function toggleTheme() {
            const body = document.body;
            const icon = document.getElementById('arattai-icon');
            const labelBright = document.getElementById('label-bright');
            const labelDark = document.getElementById('label-dark');

            // Toggle the dark-mode class on body
            body.classList.toggle('dark-mode');

            if (body.classList.contains('dark-mode')) {
                // DARK MODE: Apply White Icon
                icon.className = 'fa-arattai fa-arattai-white';
                labelDark.classList.add('active');
                labelBright.classList.remove('active');
            } else {
                // BRIGHT MODE: Reset to Standard Blue
                icon.className = 'fa-arattai';
                labelBright.classList.add('active');
                labelDark.classList.remove('active');
            }
        }

        // Initialize labels
        document.getElementById('label-bright').classList.add('active');
    </script>
</body>
</html>
